<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宋禮 SUNG LI SELECT | 畢業小熊編織花束預購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Noto+Serif+TC:wght@400;600;900&display=swap');
        
        /* 全域重置，強制所有元素以 box-border 渲染，徹底防止手機版任何元件溢出 */
        *, *:before, *:after { 
            box-sizing: border-box !important; 
        }

        .font-serif-tc { font-family: 'Noto Serif TC', serif; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        body { background-color: #0d0d0d; color: #f5f5f5; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* 訂製金色滾邊與滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d0d0d; }
        ::-webkit-scrollbar-thumb { background: #c5a880; border-radius: 3px; }

        /* 強制將瀏覽器原生行事曆按鈕變更為精緻香檳金色 */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(80%) sepia(13%) saturate(1005%) hue-rotate(344deg) brightness(89%) contrast(85%);
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            background-color: rgba(197, 168, 128, 0.15);
        }
        
        /* 避免 iOS/Android 原生日曆字體縮小與跑版 */
        input[type="date"] {
            font-size: 1.125rem !important; /* 18px */
            font-weight: 700 !important;
            width: 100% !important;
            max-width: 100% !important;
        }

        /* 3D 旋轉輪播過渡動畫 */
        .carousel-container {
            perspective: 1000px;
        }
        .carousel-card {
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
    </style>
</head>
<body class="font-serif-tc selection:bg-[#c5a880] selection:text-[#0d0d0d]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 設定區 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycby7qSpHzKkUeDQixbI2eLS9uk9F4J8ZEWx-5O1yEEdOC01cxfh22u3YGiwn4OIfTUvS/exec"; 

        const BOUQUET_PRICE = 499;

        // 圖片與款式資料
        const VARIANTS = [
            { 
                id: '藍', 
                name: '藍韻 BLUE BREEZE', 
                price: BOUQUET_PRICE,
                desc: '澄澈如蔚藍微風，編織出青春最純粹的祝福。',
                img: 'blue.jpg',
                badge: '青春藍韻'
            },
            { 
                id: '粉', 
                name: '粉馨 PINK BLOOM', 
                price: BOUQUET_PRICE,
                desc: '溫柔的粉馨綻放，承載畢業季最溫暖難忘的記憶。',
                img: 'pink.jpg',
                badge: '甜美粉馨'
            },
            { 
                id: '黃', 
                name: '暖陽 WARM SUNSHINE', 
                price: BOUQUET_PRICE,
                desc: '如煦煦暖陽般耀眼，祝願未來旅程充滿無限希望。',
                img: 'yellow.jpg',
                badge: '燦爛暖陽'
            }
        ];

        // 交貨地點物件化，支援標籤與副標題顯示 (新增賣貨便選項)
        const LOCATIONS = [
            { name: "捷運江子翠站五號出口", badge: "定點面交", urgent: false },
            { name: "捷運蘆洲站三號出口", badge: "定點面交", urgent: false },
            { name: "自取急件 (東園派出所舊址)", badge: "急單專用", urgent: true, address: "台北市萬華區長泰街130號" },
            { name: "7-11 賣貨便 (運費另計)", badge: "超商寄送", urgent: false, isMail: true }
        ];

        // 完全由 React 託管的 Icon 元件，徹底杜絕真實 DOM 與虛擬 DOM 的衝突問題
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                sparkles: (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                        <path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5 5 3Z"/>
                        <path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1 1-2.5Z"/>
                    </svg>
                ),
                "chevron-left": (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m15 18-6-6 6-6"/>
                    </svg>
                ),
                "chevron-right": (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m9 18 6-6-6-6"/>
                    </svg>
                ),
                flower: (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M12 7.5a4.5 4.5 0 1 1 4.5 4.5M12 7.5A4.5 4.5 0 1 0 7.5 12M12 7.5V12m0 4.5a4.5 4.5 0 1 1-4.5-4.5M12 16.5A4.5 4.5 0 1 0 16.5 12M12 16.5V12m4.5 0a4.5 4.5 0 1 1-4.5 4.5M16.5 12H12m-9 0a4.5 4.5 0 1 1 4.5-4.5M7.5 12H12"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                ),
                gift: (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect x="3" y="8" width="18" height="4" rx="1"/>
                        <path d="M12 8v13M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/>
                        <path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.3 4.3 0 0 1 12 8a4.3 4.3 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/>
                    </svg>
                ),
                check: (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M20 6 9 17l-5-5"/>
                    </svg>
                ),
                "map-pin": (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                ),
                copy: (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
                    </svg>
                ),
                "shopping-bag": (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
                        <path d="M3 6h18"/>
                        <path d="M16 10a4 4 0 0 1-8 0"/>
                    </svg>
                ),
                calendar: (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
                        <line x1="16" x2="16" y1="2" y2="6"/>
                        <line x1="8" x2="8" y1="2" y2="6"/>
                        <line x1="3" x2="21" y1="10" y2="10"/>
                    </svg>
                ),
                "alert-triangle": (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
                        <line x1="12" x2="12" y1="9" y2="13"/>
                        <line x1="12" x2="12.01" y1="17" y2="17"/>
                    </svg>
                ),
                "check-circle-2": (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <circle cx="12" cy="12" r="10"/>
                        <path d="m9 12 2 2 4-4"/>
                    </svg>
                ),
                "alert-circle": (
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" x2="12" y1="8" y2="12"/>
                        <line x1="12" x2="12.01" y1="16" y2="16"/>
                    </svg>
                )
            };
            return icons[name] || null;
        };

        const App = () => {
            const [activeIndex, setActiveIndex] = useState(0); // 當前選中款式的索引 (0:藍, 1:粉, 2:黃)
            const [quantity, setQuantity] = useState(1);
            const [location, setLocation] = useState(LOCATIONS[0].name);
            const [pickupDate, setPickupDate] = useState('2026-06-01');
            const [custName, setCustName] = useState('');
            const [custPhone, setCustPhone] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitStatus, setSubmitStatus] = useState(null); // 'success' | 'error'
            const [validationError, setValidationError] = useState(''); // 代替原生 alert
            const [imageErrors, setImageErrors] = useState({}); // 追蹤載入失敗的圖片
            const [addressCopied, setAddressCopied] = useState(false); // 複製提示狀態

            // 用於處理手勢滑動與防止上下滾動衝突的狀態
            const touchStartX = useRef(0);
            const touchStartY = useRef(0);
            const touchEndX = useRef(0);
            const isScrolling = useRef(false); // 標記是否為上下滾動網頁

            // 計算當前選擇款式的詳細資訊
            const currentVariant = useMemo(() => {
                return VARIANTS[activeIndex];
            }, [activeIndex]);

            // 輪播導覽：上一張/下一張
            const handlePrev = () => {
                setActiveIndex((prev) => (prev - 1 + VARIANTS.length) % VARIANTS.length);
            };

            const handleNext = () => {
                setActiveIndex((prev) => (prev + 1) % VARIANTS.length);
            };

            // 手勢起點
            const handleTouchStart = (e) => {
                touchStartX.current = e.targetTouches[0].clientX;
                touchStartY.current = e.targetTouches[0].clientY;
                touchEndX.current = e.targetTouches[0].clientX; // 初始化結束點
                isScrolling.current = false; // 重設滾動狀態
            };

            // 手勢移動中：智慧分析滑動軌跡
            const handleTouchMove = (e) => {
                const currentX = e.targetTouches[0].clientX;
                const currentY = e.targetTouches[0].clientY;
                
                touchEndX.current = currentX;

                const diffX = Math.abs(touchStartX.current - currentX);
                const diffY = Math.abs(touchStartY.current - currentY);

                // 如果垂直方向滑動大於水平，且超過一定程度，判定為「網頁上下滾動」
                if (diffY > diffX && diffY > 10) {
                    isScrolling.current = true;
                }
            };

            // 手勢結束
            const handleTouchEnd = () => {
                if (isScrolling.current) return;

                const diffX = touchStartX.current - touchEndX.current;
                const threshold = 50; // 判定為滑動的最小像素寬度

                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0) {
                        handleNext(); // 向左滑動 -> 下一款
                    } else {
                        handlePrev(); // 向右滑動 -> 上一款
                    }
                }
            };

            // 圖片加載錯誤處理
            const handleImageError = (id) => {
                setImageErrors(prev => ({ ...prev, [id]: true }));
            };

            // 一鍵複製地址邏輯
            const handleCopyAddress = (e, addr) => {
                e.stopPropagation();
                const tempInput = document.createElement("input");
                tempInput.value = addr;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy"); // 安全相容的複製語法
                document.body.removeChild(tempInput);
                
                setAddressCopied(true);
                setTimeout(() => setAddressCopied(false), 2000);
            };

            // 處理預訂提交
            const handleOrderSubmit = async (e) => {
                e.preventDefault();
                setValidationError('');

                if (!custName.trim() || !custPhone.trim()) {
                    setValidationError("請填寫您的「姓名」與「電話聯絡資訊」唷！");
                    // 滾動到提示訊息位置
                    document.getElementById('validation-msg-anchor')?.scrollIntoView({ behavior: 'smooth' });
                    return;
                }
                
                setIsSubmitting(true);
                setSubmitStatus(null);

                // 將地點簡化以便寫入試算表
                let shortLoc = "其他";
                if (location.includes("江子翠")) shortLoc = "江子翠";
                else if (location.includes("蘆洲")) shortLoc = "蘆洲";
                else if (location.includes("東園")) shortLoc = "東園";
                else if (location.includes("賣貨便")) shortLoc = "賣貨便";

                const payload = {
                    action: "addSale",
                    id: 'S' + Date.now(),
                    timestamp: Date.now(),
                    channel: `預約-${shortLoc} (${pickupDate})`,
                    qty: quantity,
                    style: VARIANTS[activeIndex].id,
                    custName: custName,
                    custPhone: custPhone,
                    gross: BOUQUET_PRICE * quantity,
                    fee: 0,
                    seller: "線上預約"
                };

                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    setSubmitStatus('success');
                    setCustName('');
                    setCustPhone('');
                    setQuantity(1);
                } catch (error) {
                    console.error("預約失敗", error);
                    setSubmitStatus('error');
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center w-full max-w-full overflow-hidden">
                    
                    {/* Hero 形象大圖橫幅 */}
                    <div className="w-full relative h-[45vh] sm:h-[60vh] overflow-hidden flex items-end justify-center">
                        <img 
                            src="banner.jpg" 
                            alt="畢業小熊編織花束合照" 
                            className="absolute inset-0 w-full h-full object-cover brightness-[0.5]"
                            onError={() => handleImageError('banner')}
                        />
                        {imageErrors['banner'] && (
                            <div className="absolute inset-0 bg-gradient-to-b from-zinc-900 to-[#0d0d0d] flex items-center justify-center">
                                <span className="font-cinzel text-zinc-700 tracking-[0.3em] text-sm font-bold">SUNG LI SELECT</span>
                            </div>
                        )}
                        <div className="absolute inset-0 bg-gradient-to-t from-[#0d0d0d] via-transparent to-black/30"></div>
                        <div className="relative text-center pb-8 px-4 z-10 animate-in fade-in slide-in-from-bottom-6 duration-1000">
                            <p className="font-cinzel text-[#c5a880] tracking-[0.25em] text-xs sm:text-sm uppercase font-bold mb-2">Sung Li Select</p>
                            <h1 className="text-3xl sm:text-5xl font-extrabold tracking-widest text-white mb-2 drop-shadow-lg font-serif-tc">畢業小熊編織花束</h1>
                            <p className="text-slate-300 text-xs sm:text-sm max-w-md mx-auto font-light">精選美好 · 傳遞心意。為即將展翅高飛的他們，獻上一份永不凋謝的溫暖祝福。</p>
                        </div>
                    </div>

                    {/* 主體內容容器 */}
                    <main className="max-w-4xl w-full px-4 py-12 space-y-16 box-border overflow-hidden">
                        
                        {/* 介紹區塊 */}
                        <section className="text-center max-w-xl mx-auto space-y-4">
                            <h2 className="text-2xl font-bold text-[#c5a880] tracking-wider">限時限量 尊榮預定</h2>
                            <div className="h-[1px] w-12 bg-[#c5a880] mx-auto"></div>
                            <p className="text-sm text-slate-400 leading-relaxed">
                                由我們精心手工勾針編織的向日葵與超萌畢業小熊，象徵陽光璀璨的前程。
                            </p>
                        </section>

                        {/* 3D 輪播立體展示挑選區 */}
                        <section className="space-y-8 select-none w-full">
                            <h3 className="text-lg font-bold tracking-widest text-[#c5a880] text-center uppercase flex items-center justify-center gap-2">
                                <Icon name="sparkles" className="w-4 h-4" />
                                <span>選擇花束款式</span>
                            </h3>
                            
                            {/* 輪播主體 */}
                            <div 
                                className="relative w-full h-[450px] flex items-center justify-center overflow-visible carousel-container py-4"
                                onTouchStart={handleTouchStart}
                                onTouchMove={handleTouchMove}
                                onTouchEnd={handleTouchEnd}
                                style={{ touchAction: 'pan-y' }}
                            >
                                
                                {/* 左控制箭頭 */}
                                <button 
                                    onClick={handlePrev}
                                    className="absolute left-2 sm:left-10 z-40 bg-black/60 hover:bg-black/90 text-[#c5a880] hover:text-[#e5cfa3] w-12 h-12 rounded-full border border-zinc-800 flex items-center justify-center transition-all shadow-lg active:scale-90"
                                >
                                    <Icon name="chevron-left" className="w-6 h-6" />
                                </button>

                                {/* 卡片容器 */}
                                <div className="relative w-full max-w-[280px] h-[390px] flex items-center justify-center">
                                    {VARIANTS.map((v, index) => {
                                        let position = "center"; 
                                        const diff = index - activeIndex;
                                        
                                        if (diff === 0) position = "center";
                                        else if (diff === 1 || (diff === -2 && VARIANTS.length === 3)) position = "right";
                                        else if (diff === -1 || (diff === 2 && VARIANTS.length === 3)) position = "left";
                                        
                                        let styleClasses = "";
                                        if (position === "center") {
                                            styleClasses = "translate-x-0 scale-100 z-30 opacity-100 border-[#c5a880] ring-4 ring-[#c5a880]/30 shadow-[0_0_30px_rgba(197,168,128,0.4)]";
                                        } else if (position === "left") {
                                            styleClasses = "-translate-x-[65%] sm:-translate-x-[90%] scale-75 z-10 opacity-30 pointer-events-none blur-[1px] border-zinc-800";
                                        } else if (position === "right") {
                                            styleClasses = "translate-x-[65%] sm:translate-x-[90%] scale-75 z-10 opacity-30 pointer-events-none blur-[1px] border-zinc-800";
                                        }

                                        return (
                                            <div 
                                                key={v.id}
                                                onClick={() => {
                                                    if (position !== "center") {
                                                        setActiveIndex(index);
                                                    }
                                                }}
                                                className={`absolute w-full h-full rounded-2xl overflow-hidden bg-zinc-950 border carousel-card cursor-pointer flex flex-col justify-between ${styleClasses}`}
                                            >
                                                {/* 款式照片區 */}
                                                <div className="relative h-[240px] overflow-hidden bg-zinc-900">
                                                    {imageErrors[v.id] ? (
                                                        <div className="w-full h-full flex flex-col items-center justify-center text-[#c5a880]/40 p-6 text-center">
                                                            <Icon name="flower" className="w-10 h-10 mb-3 animate-pulse" />
                                                            <span className="font-cinzel text-xs tracking-wider font-bold">{v.badge}</span>
                                                        </div>
                                                    ) : (
                                                        <img 
                                                            src={v.img} 
                                                            alt={v.name} 
                                                            onError={() => handleImageError(v.id)}
                                                            className={`w-full h-full object-cover transition-transform duration-700 ${position === 'center' ? 'scale-100 brightness-110' : 'scale-95 brightness-50'}`}
                                                        />
                                                    )}
                                                    <span className="absolute top-3 left-3 bg-zinc-950/80 backdrop-blur-sm text-zinc-300 font-bold text-[10px] px-2.5 py-1 rounded-full uppercase tracking-wider">
                                                        {v.badge}
                                                    </span>
                                                </div>

                                                {/* 款式文字敘述區 */}
                                                <div className="p-4 bg-zinc-950 flex-1 flex flex-col justify-between border-t border-zinc-900/50">
                                                    <div className="text-center">
                                                        <h4 className={`font-bold text-sm tracking-wide transition-colors ${position === 'center' ? 'text-[#c5a880]' : 'text-zinc-500'}`}>{v.name}</h4>
                                                        <p className={`text-[10px] text-zinc-400 mt-1 leading-relaxed line-clamp-2 transition-all ${position === 'center' ? 'opacity-100' : 'opacity-0'}`}>{v.desc}</p>
                                                    </div>
                                                    <div className="flex justify-center items-center pt-2">
                                                        <span className="text-base font-bold text-[#c5a880] font-cinzel">${v.price}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* 右控制箭頭 */}
                                <button 
                                    onClick={handleNext}
                                    className="absolute right-2 sm:right-10 z-40 bg-black/60 hover:bg-black/90 text-[#c5a880] hover:text-[#e5cfa3] w-12 h-12 rounded-full border border-zinc-800 flex items-center justify-center transition-all shadow-lg active:scale-90"
                                >
                                    <Icon name="chevron-right" className="w-6 h-6" />
                                </button>
                            </div>

                            {/* 輪播底部進度點指示器 */}
                            <div className="flex justify-center items-center gap-3 pt-2">
                                {VARIANTS.map((_, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => setActiveIndex(idx)}
                                        className={`h-1.5 rounded-full transition-all duration-300 ${activeIndex === idx ? 'w-8 bg-[#c5a880]' : 'w-2 bg-zinc-800 hover:bg-zinc-700'}`}
                                    />
                                ))}
                            </div>
                        </section>

                        {/* 預訂資料填寫 */}
                        <section className="bg-zinc-950 border border-zinc-900 rounded-3xl p-5 sm:p-10 shadow-2xl relative overflow-hidden box-border max-w-full">
                            <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-[#c5a880] to-transparent"></div>
                            
                            {/* 拍照上傳特別解鎖卡片 */}
                            <div className="max-w-md mx-auto mb-10 p-5 rounded-2xl bg-zinc-900/60 border border-[#c5a880]/30 shadow-lg relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-[#c5a880] text-[#0d0d0d] text-[10px] font-black px-3 py-1 rounded-bl-xl uppercase tracking-widest">
                                    驚喜回饋
                                </div>
                                <div className="flex items-start gap-3.5">
                                    <div className="w-10 h-10 rounded-xl bg-[#c5a880]/10 border border-[#c5a880]/40 flex items-center justify-center text-[#c5a880] flex-shrink-0">
                                        <Icon name="gift" className="w-5 h-5 animate-pulse" />
                                    </div>
                                    <div>
                                        <h4 className="text-sm font-bold text-[#c5a880] tracking-wide mb-1 flex items-center gap-1.5">
                                            <span>解鎖花束精美提袋</span>
                                        </h4>
                                        <p className="text-xs sm:text-sm text-zinc-300 leading-relaxed font-serif-tc font-bold">
                                            取貨時拍照上傳臉書粉專，再送精美花束提袋唷！
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <h3 className="text-xl font-bold tracking-widest text-[#c5a880] text-center mb-8">填寫預約交貨資訊</h3>

                            <form onSubmit={handleOrderSubmit} className="space-y-6 max-w-full sm:max-w-lg mx-auto box-border overflow-hidden">
                                
                                {/* 目前所選款式摘要 */}
                                <div className="p-4 rounded-xl bg-zinc-900/50 border border-zinc-800 flex items-center justify-between gap-4 box-border max-w-full overflow-hidden">
                                    <div className="flex items-center gap-3">
                                        {imageErrors[currentVariant.id] ? (
                                            <div className="w-12 h-12 rounded-lg bg-zinc-900 border border-[#c5a880]/30 flex items-center justify-center text-[#c5a880]/60 flex-shrink-0">
                                                <Icon name="flower" className="w-6 h-6" />
                                            </div>
                                        ) : (
                                            <img src={currentVariant.img} className="w-12 h-12 rounded-lg object-cover ring-2 ring-[#c5a880]/50 flex-shrink-0" />
                                        )}
                                        <div className="min-w-0">
                                            <p className="text-xs text-[#c5a880] font-bold truncate">當前選擇款式</p>
                                            <h5 className="text-sm font-bold text-white truncate">{currentVariant.name}</h5>
                                        </div>
                                    </div>
                                    <div className="text-right flex-shrink-0">
                                        <span className="text-xs text-zinc-500 block">總預購金額</span>
                                        <p className="text-lg font-bold text-[#c5a880] font-cinzel">${BOUQUET_PRICE * quantity}</p>
                                    </div>
                                </div>

                                {/* 數量選擇 */}
                                <div className="w-full box-border">
                                    <label className="text-xs font-bold text-zinc-400 block mb-2 tracking-widest uppercase">購買數量</label>
                                    <div className="flex items-center gap-4">
                                        <button 
                                            type="button" 
                                            onClick={() => setQuantity(q => Math.max(1, q - 1))}
                                            className="w-10 h-10 rounded-xl bg-zinc-900 hover:bg-zinc-800 text-white font-bold border border-zinc-800 flex items-center justify-center transition-colors"
                                        >
                                            -
                                        </button>
                                        <span className="text-lg font-bold font-cinzel w-8 text-center">{quantity}</span>
                                        <button 
                                            type="button" 
                                            onClick={() => setQuantity(q => q + 1)}
                                            className="w-10 h-10 rounded-xl bg-zinc-900 hover:bg-zinc-800 text-white font-bold border border-zinc-800 flex items-center justify-center transition-colors"
                                        >
                                            +
                                        </button>
                                    </div>
                                </div>

                                {/* 交貨地點 */}
                                <div className="w-full box-border">
                                    <label className="text-xs font-bold text-zinc-400 block mb-2 tracking-widest uppercase">交貨站點</label>
                                    <div className="grid grid-cols-1 gap-3 w-full box-border">
                                        {LOCATIONS.map(loc => {
                                            const isSelected = location === loc.name;
                                            return (
                                                <div 
                                                    key={loc.name} 
                                                    className={`rounded-xl border transition-all duration-300 overflow-hidden ${
                                                        isSelected 
                                                            ? 'border-[#c5a880] bg-[#c5a880]/5 ring-2 ring-[#c5a880]/20 shadow-[0_4px_20px_rgba(197,168,128,0.15)]' 
                                                            : 'border-zinc-800 bg-zinc-900'
                                                    }`}
                                                >
                                                    {/* 選取觸發按鈕 */}
                                                    <button 
                                                        type="button"
                                                        onClick={() => setLocation(loc.name)}
                                                        className="p-4 w-full text-base sm:text-lg font-bold text-left flex items-center justify-between w-full box-border outline-none"
                                                    >
                                                        <div className="flex items-center gap-2">
                                                            <span>{loc.name}</span>
                                                            {loc.badge && (
                                                                <span className={`text-[9px] px-2 py-0.5 rounded border font-black flex-shrink-0 ${
                                                                    loc.urgent 
                                                                        ? 'bg-amber-500/20 text-[#c5a880] border-[#c5a880]/30 animate-pulse' 
                                                                        : loc.badge === '超商寄送'
                                                                        ? 'bg-green-500/20 text-green-400 border-green-500/30'
                                                                        : 'bg-zinc-800 text-zinc-400 border-zinc-700'
                                                                }`}>
                                                                    {loc.badge}
                                                                </span>
                                                            )}
                                                        </div>
                                                        <span className={`w-3.5 h-3.5 rounded-full flex-shrink-0 ml-4 transition-all duration-300 flex items-center justify-center ${
                                                            isSelected 
                                                                ? 'bg-[#c5a880] shadow-[0_0_8px_#c5a880]' 
                                                                : 'border-2 border-zinc-700 bg-transparent'
                                                        }`}>
                                                            {isSelected && <Icon name="check" className="w-2.5 h-2.5 text-[#0d0d0d]" />}
                                                        </span>
                                                    </button>

                                                    {/* 附加說明卡片 (直接嵌套在此站點卡片內部，完美解決視覺分離問題) */}
                                                    {isSelected && (loc.address || loc.isMail) && (
                                                        <div className="px-4 pb-4 border-t border-zinc-800/40 pt-3 animate-in fade-in slide-in-from-top-2 duration-300 w-full box-border">
                                                            
                                                            {/* 東園自取地址說明 */}
                                                            {loc.address && (
                                                                <div className="p-3.5 rounded-lg bg-zinc-950 border border-[#c5a880]/20 flex items-center justify-between gap-4 w-full box-border">
                                                                    <div className="flex items-start gap-2.5 min-w-0">
                                                                        <Icon name="map-pin" className="w-5 h-5 text-[#c5a880] flex-shrink-0 mt-0.5" />
                                                                        <div className="min-w-0">
                                                                            <p className="text-[10px] text-[#c5a880] font-black uppercase tracking-widest">自取地址 (東園派出所舊址)</p>
                                                                            <p className="text-sm font-bold text-white leading-snug break-words">
                                                                                {loc.address}
                                                                            </p>
                                                                        </div>
                                                                    </div>
                                                                    <button
                                                                        type="button"
                                                                        onClick={(e) => handleCopyAddress(e, loc.address)}
                                                                        className="px-3 py-2 rounded-lg bg-[#c5a880]/10 hover:bg-[#c5a880]/20 border border-[#c5a880]/30 text-[#c5a880] font-bold text-xs flex items-center gap-1 flex-shrink-0 transition-all active:scale-95"
                                                                    >
                                                                        <Icon name={addressCopied ? "check" : "copy"} className="w-3.5 h-3.5" />
                                                                        <span>{addressCopied ? "已複製" : "複製地址"}</span>
                                                                    </button>
                                                                </div>
                                                            )}

                                                            {/* 7-11 賣貨便特別提醒 */}
                                                            {loc.isMail && (
                                                                <div className="p-3.5 rounded-lg bg-zinc-950 border border-green-500/20 flex items-start gap-3 w-full box-border">
                                                                    <Icon name="shopping-bag" className="w-5 h-5 text-green-400 flex-shrink-0 mt-0.5" />
                                                                    <div className="min-w-0">
                                                                        <p className="text-[10px] text-green-400 font-black uppercase tracking-widest">系統提醒 (7-11 賣貨便)</p>
                                                                        <p className="text-sm font-bold text-zinc-300 leading-snug break-words mt-1">
                                                                            下單後，我們將於 24 小時內透過電話/簡訊提供您專屬的「7-11 賣貨便賣場連結」，再請協助完成超商收件資訊填寫與付款。
                                                                        </p>
                                                                    </div>
                                                                </div>
                                                            )}

                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* 預約日期 */}
                                <div className="w-full box-border">
                                    <label className="text-xs font-bold text-zinc-400 block mb-2 tracking-widest uppercase">交貨日期</label>
                                    <div className="relative w-full box-border overflow-hidden">
                                        <input 
                                            type="date" 
                                            min="2026-06-01" 
                                            className="w-full box-border p-4 pl-12 pr-4 bg-zinc-900 border border-zinc-800 text-white rounded-xl outline-none focus:border-[#c5a880] font-cinzel text-lg sm:text-xl font-bold transition-all [color-scheme:dark]"
                                            value={pickupDate}
                                            onChange={(e) => setPickupDate(e.target.value)}
                                            required
                                        />
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-[#c5a880] pointer-none">
                                            <Icon name="calendar" className="w-5 h-5" />
                                        </div>
                                    </div>
                                    <p className="text-[10px] sm:text-xs text-[#c5a880] mt-2 flex items-center gap-1">
                                        ⏰ 固定交貨時間皆為晚間 <strong className="underline">18:30 ~ 19:00</strong>（不適用於超商寄送）
                                    </p>
                                </div>

                                {/* 客戶聯絡資訊 */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full box-border">
                                    <div className="w-full box-border">
                                        <label className="text-xs font-bold text-zinc-400 block mb-2 tracking-widest uppercase">聯絡人姓名</label>
                                        <input 
                                            type="text" 
                                            placeholder="請輸入大名" 
                                            className="w-full p-4 bg-zinc-900 border border-zinc-800 text-white placeholder:text-zinc-600 rounded-xl outline-none focus:border-[#c5a880] text-sm transition-colors box-border"
                                            value={custName}
                                            onChange={(e) => setCustName(e.target.value)}
                                            required
                                        />
                                    </div>
                                    <div className="w-full box-border">
                                        <label className="text-xs font-bold text-zinc-400 block mb-2 tracking-widest uppercase">聯絡電話</label>
                                        <input 
                                            type="tel" 
                                            placeholder="例: 0912345678" 
                                            className="w-full p-4 bg-zinc-900 border border-zinc-800 text-white placeholder:text-zinc-600 rounded-xl outline-none focus:border-[#c5a880] text-sm transition-colors box-border"
                                            value={custPhone}
                                            onChange={(e) => setCustPhone(e.target.value)}
                                            required
                                        />
                                    </div>
                                </div>

                                {/* 優雅替代原生彈窗的警告字樣 */}
                                {validationError && (
                                    <div id="validation-msg-anchor" className="p-3.5 rounded-xl bg-amber-500/10 border border-[#c5a880]/30 text-amber-200 text-xs text-center flex items-center justify-center gap-2 animate-pulse">
                                        <Icon name="alert-triangle" className="w-4 h-4 text-[#c5a880]" />
                                        <span>{validationError}</span>
                                    </div>
                                )}

                                {/* 提交按鈕 */}
                                <button 
                                    type="submit" 
                                    disabled={isSubmitting}
                                    className={`w-full py-4 rounded-xl font-bold text-sm tracking-widest transition-all duration-300 flex items-center justify-center gap-2 box-border
                                    ${isSubmitting ? 'bg-zinc-800 text-zinc-500 cursor-not-allowed' : 'bg-[#c5a880] text-[#0d0d0d] hover:bg-[#b3966d] active:scale-95 shadow-lg shadow-[#c5a880]/10'}`}
                                >
                                    {isSubmitting ? (
                                        <>
                                            <div className="w-4 h-4 border-2 border-zinc-500 border-t-zinc-300 rounded-full animate-spin"></div>
                                            提交預約中...
                                        </>
                                    ) : (
                                        <>
                                            確認預購提交
                                        </>
                                    )}
                                </button>
                            </form>
                        </section>
                    </main>

                    {/* 成功 / 失敗彈窗 */}
                    {submitStatus && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-in fade-in duration-300">
                            <div className="bg-zinc-950 border border-zinc-800 p-8 rounded-3xl max-w-xs w-full text-center space-y-4 shadow-2xl relative">
                                <div className="absolute top-0 left-0 right-0 h-1 bg-[#c5a880]"></div>
                                {submitStatus === 'success' ? (
                                    <>
                                        <div className="w-12 h-12 rounded-full bg-green-500/10 text-green-400 flex items-center justify-center mx-auto mb-2">
                                            <Icon name="check-circle-2" className="w-8 h-8" />
                                        </div>
                                        <h4 className="text-lg font-bold text-white tracking-wider">預約成功</h4>
                                        <p className="text-xs text-zinc-400 leading-relaxed">
                                            我們已收到您的精緻花束預訂！我們會盡速透過電話/簡訊與您聯絡，敬請保持手機通暢。
                                        </p>
                                    </>
                                ) : (
                                    <>
                                        <div className="w-12 h-12 rounded-full bg-red-500/10 text-red-400 flex items-center justify-center mx-auto mb-2">
                                            <Icon name="alert-circle" className="w-8 h-8" />
                                        </div>
                                        <h4 className="text-lg font-bold text-white tracking-wider">提交失敗</h4>
                                        <p className="text-xs text-zinc-400 leading-relaxed">
                                            可能因為伺服器忙碌中，請檢查您的網路狀態並稍後再試一次！
                                        </p>
                                    </>
                                )}
                                <button 
                                    onClick={() => setSubmitStatus(null)}
                                    className="w-full py-2.5 rounded-xl bg-zinc-900 border border-zinc-800 text-xs font-bold text-zinc-300 hover:bg-zinc-800 transition-colors"
                                >
                                    確認並關閉
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 頁尾品牌宣告 */}
                    <footer className="w-full border-t border-zinc-900 py-12 text-center text-zinc-600 text-xs space-y-2 mt-auto">
                        <p className="font-cinzel text-zinc-500 tracking-[0.2em]">SUNG LI SELECT</p>
                        <p>© 2026 宋禮美學工作室. All Rights Reserved.</p>
                        <p className="text-[10px] text-zinc-700">江子翠站 / 蘆洲站 / 東園派出所 / 7-11賣貨便 預購服務</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
